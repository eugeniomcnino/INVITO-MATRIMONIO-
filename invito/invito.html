<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosanna & Toni - Invito Matrimonio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #1a0a0a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===== PAGINA 1 - COPERTINA ===== */
    #pagina1 {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      transition: opacity 0.8s ease, transform 0.8s ease;
      z-index: 10;
    }

    #pagina1.nascondi {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    #pagina1 img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }

    /* Cuore cliccabile sopra l'immagine */
    #cuore-btn {
      position: absolute;
      /* MODIFICA QUESTI VALORI per posizionare il cuore sopra
         al cuore blu nella tua immagine */
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      cursor: pointer;
      z-index: 20;
      animation: pulsazione 1.5s ease-in-out infinite;
      background: transparent;
      border: none;
      outline: none;
    }

    #cuore-btn svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 15px rgba(30, 100, 200, 0.8));
    }

    #cuore-btn:hover svg {
      filter: drop-shadow(0 0 25px rgba(30, 100, 255, 1));
      transform: scale(1.1);
    }

    @keyframes pulsazione {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.12); }
    }

    /* Testo "Tocca il cuore" */
    .hint-text {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(150, 180, 255, 0.7);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: lampeggia 2s ease-in-out infinite;
    }

    @keyframes lampeggia {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ===== PARTICELLE ===== */
    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: vola 1s ease-out forwards;
    }

    @keyframes vola {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    /* ===== PAGINA 2 - DETTAGLI INVITO ===== */
    #pagina2 {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease 0.3s;
      background: #0d0d0d;
      z-index: 5;
    }

    #pagina2.visibile {
      opacity: 1;
      pointer-events: all;
    }

    #pagina2 img.img-invito2 {
      max-width: 100%;
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }

    /* Box pulsanti */
    .pulsanti-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 20px 50px;
      width: 100%;
      max-width: 500px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .btn-maps {
      background: linear-gradient(135deg, #1e5c99, #2980b9);
      color: white;
    }

    .btn-rsvp {
      background: linear-gradient(135deg, #8e2357, #c0396b);
      color: white;
    }

    .btn-icon {
      font-size: 20px;
    }
  </style>
</head>
<body>

  <!-- ========== PAGINA 1 ========== -->
  <div id="pagina1">

    <!-- 
      SOSTITUISCI "copertina.jpg" con il nome del tuo file immagine
      (metti il file JPG nella stessa cartella di questo file HTML)
    -->
    <img src="partecipazione 2.jpg" alt="Invito Matrimonio Rosanna e Toni">

    <!-- CUORE BLU CLICCABILE -->
    <button id="cuore-btn" onclick="apriInvito(event)" title="Apri l'invito">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 85 C50 85 5 55 5 28 C5 12 17 3 30 3 C38 3 45 7 50 14 
                 C55 7 62 3 70 3 C83 3 95 12 95 28 C95 55 50 85 50 85 Z"
              fill="#1a6ec8" opacity="0.9"/>
        <path d="M50 75 C50 75 12 50 12 28 C12 16 21 10 30 10 
                 C37 10 43 13 50 20 C57 13 63 10 70 10 
                 C79 10 88 16 88 28 C88 50 50 75 50 75 Z"
              fill="#2e8bf0" opacity="0.6"/>
      </svg>
    </button>

    <p class="hint-text">✦ Tocca il cuore per aprire l'invito ✦</p>
  </div>

  <!-- ========== PAGINA 2 ========== -->
  <div id="pagina2">

    <!-- 
      SOSTITUISCI "invito-interno.jpg" con il nome del tuo secondo file JPG
    -->
    <img class="img-invito2" src="partecipazione1.jpg" alt="Dettagli Matrimonio">

    <div class="pulsanti-box">

      <!-- PULSANTE GOOGLE MAPS -->
      <a class="btn btn-maps"
         href="https://maps.google.com/?q=La+Fenice+Ricevimenti,+Contrada+Petruso-Danigargi,+Trabia,+Palermo"
         target="_blank">
        <span class="btn-icon">📍</span>
        Vedi la Location su Maps
      </a>

      <!-- PULSANTE CONFERMA PRESENZA -->
      <a class="btn btn-rsvp"
         href="https://docs.google.com/forms/d/19rIZ1PFpIUlZadlfgORoLf53d-YTtGOj_7-o3rgZPsc/viewform"
         target="_blank">
        <span class="btn-icon">💌</span>
        Conferma la tua Presenza
      </a>

    </div>
  </div>

  <!-- ========== JAVASCRIPT ========== -->
  <script>
    function apriInvito(event) {
      // Effetto particelle
      for (let i = 0; i < 20; i++) {
        creaParticella(event.clientX, event.clientY);
      }

      // Dopo 400ms mostra pagina 2
      setTimeout(function() {
        document.getElementById('pagina1').classList.add('nascondi');
        document.getElementById('pagina2').classList.add('visibile');
      }, 400);
    }

    function creaParticella(x, y) {
      var p = document.createElement('div');
      p.classList.add('particle');
      var angle = Math.random() * 360;
      var distance = 60 + Math.random() * 80;
      var dx = Math.cos(angle * Math.PI / 180) * distance + 'px';
      var dy = Math.sin(angle * Math.PI / 180) * distance + 'px';
      p.style.cssText =
        'left:' + x + 'px;top:' + y + 'px;' +
        'background:hsl(' + (190 + Math.random()*60) + ',80%,60%);' +
        '--dx:' + dx + ';--dy:' + dy;
      document.body.appendChild(p);
      setTimeout(function() { p.remove(); }, 1000);
    }
  </script>

</body>
</html>
