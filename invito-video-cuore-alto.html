<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invito Matrimonio - Toni & Rosanna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #1a0a0a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #pagina1 {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      transition: opacity 1.2s ease, transform 1.2s ease;
      z-index: 10;
      overflow: hidden;
    }

    #pagina1.nascondi {
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    #pagina1 img.cover-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    #cuore-btn {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      cursor: pointer;
      z-index: 20;
      animation: pulsazione 1.5s ease-in-out infinite;
      background: transparent;
      border: none;
      outline: none;
    }

    #cuore-btn svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 15px rgba(30, 100, 200, 0.8));
    }

    #cuore-btn:hover svg {
      filter: drop-shadow(0 0 25px rgba(30, 100, 255, 1));
      transform: scale(1.1);
    }

    @keyframes pulsazione {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.12); }
    }

    .hint-text {
      position: absolute;
      top: calc(8% + 78px);
      left: 50%;
      transform: translateX(-50%);
      color: #2f56c7;
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      white-space: nowrap;
      animation: lampeggia 2s ease-in-out infinite;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.7);
      z-index: 20;
    }

    @keyframes lampeggia {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }

    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: vola 1s ease-out forwards;
    }

    @keyframes vola {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    #pagina2 {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.3);
      pointer-events: none;
      transition: opacity 1.8s ease 0.4s, transform 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.4s;
      background: #0d0d0d;
      z-index: 5;
    }

    #pagina2.visibile {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }

    .video-wrapper {
      position: relative;
      width: min(95vw, 700px);
      height: min(75vh, 900px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .pulsanti-box {
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(86%, 430px);
padding: 18px 0 10px 0;
      z-index: 20;
flex-shrink: 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .btn-maps {
      background: linear-gradient(135deg, #1e5c99, #2980b9);
    }

    .btn-rsvp {
      background: linear-gradient(135deg, #8e2357, #c0396b);
    }

    .btn-icon {
      font-size: 20px;
    }

    @media (max-width: 768px) {
      #cuore-btn {
        top: 11%;
        width: 88px;
        height: 88px;
      }

      .hint-text {
        top: calc(11% + 58px);
        font-size: 13px;
        white-space: normal;
        width: 220px;
      }

      .video-wrapper {
        width: 100vw;
        height: 100vh;
        padding: 10px;
      }

      .video-wrapper video {
        border-radius: 10px;
      }

      .pulsanti-box {
        bottom: 3%;
        width: 88%;
        gap: 12px;
      }

      .btn {
        padding: 14px 18px;
        font-size: 15px;
      }
.pagina2-contenuto {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  gap: 0;
}
    }
  </style>
</head>
<body>

  <audio id="musica" loop preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <div id="pagina1">
    <img class="cover-img" src="copertina.jpg" alt="Invito Matrimonio Rosanna e Toni">

    <button id="cuore-btn" onclick="apriInvito(event)" title="Apri l'invito">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 85 C50 85 5 55 5 28 C5 12 17 3 30 3 C38 3 45 7 50 14 C55 7 62 3 70 3 C83 3 95 12 95 28 C95 55 50 85 50 85 Z"
              fill="#1a6ec8" opacity="0.9"/>
        <path d="M50 75 C50 75 12 50 12 28 C12 16 21 10 30 10 C37 10 43 13 50 20 C57 13 63 10 70 10 C79 10 88 16 88 28 C88 50 50 75 50 75 Z"
              fill="#2e8bf0" opacity="0.6"/>
      </svg>
    </button>

    <p class="hint-text">Clicca qui per aprire l'invito</p>
  </div>

 <div id="pagina2">
  <div class="pagina2-contenuto">
    <div class="video-wrapper">
      <video id="videoInvito" autoplay muted playsinline loop>
        <source src="invito-video.mp4" type="video/mp4">
      </video>
    </div>

    <div class="pulsanti-box">
      <a class="btn btn-maps"
         href="https://maps.google.com/?q=La+Fenice+Ricevimenti,+Contrada+Petruso,+Trabia,+Palermo"
         target="_blank" rel="noopener noreferrer">
        <span class="btn-icon">📍</span>
        Vedi la Location su Maps
      </a>

      <a class="btn btn-rsvp"
         href="https://docs.google.com/forms/d/e/1FAIpQLSddhKLbrDjGhtGeCNLyy03OifrO5KxlE1bZEimm6ODvWMu0vQ/viewform?usp=publish-editor"
         target="_blank" rel="noopener noreferrer">
        <span class="btn-icon">💌</span>
        Conferma la tua Presenza
      </a>
    </div>
  </div>
</div>

  <script>
    function apriInvito(event) {
      var musica = document.getElementById('musica');
      musica.volume = 0.4;
      musica.play().catch(function(){});

      var video = document.getElementById('videoInvito');
      if (video) {
        video.currentTime = 0;
        video.play().catch(function(){});
      }

      for (let i = 0; i < 20; i++) {
        creaParticella(event.clientX, event.clientY);
      }

      setTimeout(function() {
        document.getElementById('pagina1').classList.add('nascondi');
        document.getElementById('pagina2').classList.add('visibile');
      }, 400);
    }

    function creaParticella(x, y) {
      var p = document.createElement('div');
      p.classList.add('particle');
      var angle = Math.random() * 360;
      var distance = 60 + Math.random() * 80;
      var dx = Math.cos(angle * Math.PI / 180) * distance + 'px';
      var dy = Math.sin(angle * Math.PI / 180) * distance + 'px';
      p.style.cssText =
        'left:' + x + 'px;top:' + y + 'px;' +
        'background:hsl(' + (190 + Math.random()*60) + ',80%,60%);' +
        '--dx:' + dx + ';--dy:' + dy;
      document.body.appendChild(p);
      setTimeout(function() { p.remove(); }, 1000);
    }
  </script>

</body>
</html>
